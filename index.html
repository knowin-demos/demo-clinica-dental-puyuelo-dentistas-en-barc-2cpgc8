  transition:all 0.3s !important; background:rgba(255,255,255,0.8) !important; width:100% !important;
}
input:focus,textarea:focus,select:focus { outline:none !important; border-color:var(--kn-primary) !important; box-shadow:0 0 0 4px var(--kn-glow) !important; }
.kn-animate { opacity:0; transform:translateY(40px); transition:opacity 0.8s cubic-bezier(0.4,0,0.2,1),transform 0.8s cubic-bezier(0.4,0,0.2,1); }
.kn-animate.kn-visible { opacity:1; transform:translateY(0); }
.kn-animate-left { opacity:0; transform:translateX(-60px); transition:opacity 0.8s cubic-bezier(0.4,0,0.2,1),transform 0.8s cubic-bezier(0.4,0,0.2,1); }
.kn-animate-left.kn-visible { opacity:1; transform:translateX(0); }
.kn-animate-right { opacity:0; transform:translateX(60px); transition:opacity 0.8s cubic-bezier(0.4,0,0.2,1),transform 0.8s cubic-bezier(0.4,0,0.2,1); }
.kn-animate-right.kn-visible { opacity:1; transform:translateX(0); }
.kn-animate-scale { opacity:0; transform:scale(0.85); transition:opacity 0.7s cubic-bezier(0.4,0,0.2,1),transform 0.7s cubic-bezier(0.4,0,0.2,1); }
.kn-animate-scale.kn-visible { opacity:1; transform:scale(1); }
body::before { content:'' !important; position:fixed !important; top:-50% !important; right:-30% !important;
  width:80vw !important; height:80vw !important;
  background:radial-gradient(circle,rgba(14, 165, 233, 0.3) 0%,transparent 70%) !important;
  border-radius:50% !important; z-index:-1 !important; pointer-events:none !important;
  animation:kn-float 20s ease-in-out infinite alternate !important; }
body::after { content:'' !important; position:fixed !important; bottom:-40% !important; left:-20% !important;
  width:60vw !important; height:60vw !important;
  background:radial-gradient(circle,rgba(14, 165, 233, 0.3) 0%,transparent 70%) !important;
  border-radius:50% !important; z-index:-1 !important; pointer-events:none !important;
  animation:kn-float 25s ease-in-out infinite alternate-reverse !important; }
@keyframes kn-float { 0%{transform:translate(0,0)} 100%{transform:translate(50px,-80px)} }
nav,header,[class*="header"],[class*="nav"] { background:rgba(255,255,255,0.85) !important;
  backdrop-filter:blur(20px) !important; -webkit-backdrop-filter:blur(20px) !important;
  border-bottom:1px solid rgba(0,0,0,0.05) !important; }
footer,[class*="footer"] { background:linear-gradient(180deg,var(--kn-bg-soft) 0%,#e2e8f0 100%) !important; }
a:not([class]):not([href*="contact"]):not([href*="contacto"]) { color:var(--kn-primary) !important;
  text-decoration:none !important; transition:all 0.3s !important; -webkit-text-fill-color:var(--kn-primary) !important; }
hr { border:none !important; height:3px !important; background:var(--kn-gradient) !important; border-radius:3px !important; margin:3rem auto !important; width:60% !important; }
ul li::marker { color:var(--kn-primary) !important; }
@media(max-width:768px) { body{font-size:15px !important} section,.card,article{padding:1.2rem !important}
  a[href*="contact"],button,.btn{padding:12px 24px !important} body::before,body::after{display:none !important} }
</style>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                var triggers = document.querySelectorAll(".open-global-popup");
                var popup = document.getElementById("global_popup_form");
                var closePopup = popup.querySelector(".close-popup");

                // Open popup when button is clicked
                triggers.forEach(function(trigger) {
                    trigger.addEventListener("click", function(e) {
                        e.preventDefault();
                        popup.style.display = "flex";
                    });
                });

                // Close popup on clicking the close button
                closePopup.addEventListener("click", function() {
                    popup.style.display = "none";
                });

                // Close popup when clicking outside the popup content
                popup.addEventListener("click", function(e) {
                    if (e.target === popup) {
                        popup.style.display = "none";
                    }
                });
            });
